name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CLAUDE.md'
      - 'prompt.md'
      - 'plan.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CLAUDE.md'
      - 'prompt.md'
      - 'plan.md'

jobs:
  # ── PR 构建：仅验证三平台可编译，不生成安装包 ────────────────────────────────
  build-pr:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
          - platform: 'windows-latest'
          - platform: 'ubuntu-24.04'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Cache Linux apt packages
        if: matrix.platform == 'ubuntu-24.04'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev libpipewire-0.3-dev libgbm-dev libegl-dev
          version: 1.0

      - run: npm ci

      - name: Verify desktop build (no bundle)
        run: npm run build:desktop:release:nobundle

  # ── Tag 推送：先建 Release，再并行构建三平台，最后发布 ──────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version changes
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"

          # Extract version changes from README.md
          CHANGES=$(awk -v ver="$VERSION_NUM" '
          BEGIN { found=0; buffer="" }

          # Match version header line
          /^\*\*最新版本\*\*: v[0-9]+\.[0-9]+\.[0-9]+/ {
            if (found) exit
            if ($0 ~ "v" ver) {
              found=1
              next
            }
          }
          /^v[0-9]+\.[0-9]+\.[0-9]+ 更更?新:/ {
            if (found) exit
            if ($0 ~ "v" ver) {
              found=1
              next
            }
          }

          # Stop at next version or early versions marker
          /^\*\*早期版本/ { if (found) exit }
          /^v[0-9]+\.[0-9]+\.[0-9]+ / { if (found && $0 !~ "v" ver) exit }

          found == 1 {
            if (buffer == "" && /^$/) next
            buffer = buffer $0 "\n"
          }

          END {
            gsub(/^[ \t\n]+/, "", buffer)
            gsub(/[ \t\n]+$/, "", buffer)
            print buffer
          }
          ' README.md)

          # Save to file for multiline handling
          echo "$CHANGES" > /tmp/changes.txt
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/changes.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create draft release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGES: ${{ steps.changelog.outputs.changes }}
        run: |
          VERSION="${{ github.ref_name }}"

          RELEASE_BODY=$(cat <<'BODY'
          ## What's Changed

          $CHANGES

          ---

          ## Installation

          ### Windows
          **Installer** (recommended): Download `*-setup.exe` and run it. The installer will automatically set up WebView2 if needed.
          > Windows SmartScreen may show a warning for unsigned apps. Click **"More info"** → **"Run anyway"** to proceed.

          **Portable** (no install): Download `*-portable.exe` and run directly. Requires Windows 10/11 with WebView2 runtime pre-installed.

          ### macOS
          Download the `.dmg`, open it, and drag DailyLogger to Applications.
          > macOS Gatekeeper may block unsigned apps. Right-click the app → **"Open"** → **"Open"** to bypass. Alternatively, run in Terminal:
          > ```
          > xattr -cr /Applications/DailyLogger.app
          > ```

          ### Linux
          Download the `.tar.gz`, extract it, and run the binary:
          ```bash
          tar xzf DailyLogger-*.tar.gz
          chmod +x DailyLogger
          ./DailyLogger
          ```
          BODY
          )
          # Expand only $CHANGES variable using envsubst
          RELEASE_BODY="${RELEASE_BODY//\$CHANGES/$CHANGES}"
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases \
            -f tag_name="${{ github.ref_name }}" \
            -f name="DailyLogger ${{ github.ref_name }}" \
            -f body="$RELEASE_BODY" \
            -F draft=true \
            --jq .id)
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - run: npm ci

      - name: Build macOS app
        run: npm run build:desktop:release -- --target aarch64-apple-darwin

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$DMG" "DailyLogger-${{ github.ref_name }}-macos-arm64.dmg"
          gh release upload "${{ github.ref_name }}" "DailyLogger-${{ github.ref_name }}-macos-arm64.dmg" --clobber

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - run: npm ci

      - name: Build Windows app
        shell: pwsh
        run: |
          '{"bundle":{"targets":["nsis"]}}' | Out-File -FilePath nsis-only.json -Encoding utf8 -NoNewline
          npm run build:desktop:release -- --config nsis-only.json

      - name: Upload installer and portable to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NSIS_EXE=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" | head -1)
          cp "$NSIS_EXE" "DailyLogger-${{ github.ref_name }}-windows-x64-setup.exe"
          gh release upload "${{ github.ref_name }}" "DailyLogger-${{ github.ref_name }}-windows-x64-setup.exe" --clobber
          cp src-tauri/target/release/daily-logger.exe "DailyLogger-${{ github.ref_name }}-windows-x64-portable.exe"
          gh release upload "${{ github.ref_name }}" "DailyLogger-${{ github.ref_name }}-windows-x64-portable.exe" --clobber

  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Cache Linux apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev libpipewire-0.3-dev libgbm-dev libegl-dev
          version: 1.0

      - run: npm ci

      - name: Build Linux binary (no bundle)
        run: npm run build:desktop:release:nobundle

      - name: Upload tar.gz to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp src-tauri/target/release/daily-logger DailyLogger
          tar czf "DailyLogger-${{ github.ref_name }}-linux-x64.tar.gz" DailyLogger
          gh release upload "${{ github.ref_name }}" "DailyLogger-${{ github.ref_name }}-linux-x64.tar.gz" --clobber

  publish-release:
    name: Publish Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
