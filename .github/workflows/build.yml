name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  # ── PR 构建：验证三平台均可编译 ──────────────────────────────────────────────
  build-pr:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
          - platform: 'windows-latest'
          - platform: 'ubuntu-24.04'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev libpipewire-0.3-dev

      - run: npm ci

      - name: Build (macOS)
        if: matrix.platform == 'macos-latest'
        run: npm run tauri build

      - name: Build Windows app (no installer)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          '{"bundle":{"active":false}}' | Out-File -FilePath nobundle.json -Encoding utf8 -NoNewline
          npm run tauri build -- --config nobundle.json

      - name: Build (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: npm run tauri build

      - name: Upload macOS artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: app-macos
          path: src-tauri/target/release/bundle/**/*

      - name: Upload Windows artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: app-windows
          path: src-tauri/target/release/daily-logger.exe

      - name: Upload Linux artifact
        if: matrix.platform == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: app-linux
          path: src-tauri/target/release/daily-logger

  # ── Tag 推送：先建 Release，再并行构建三平台，最后发布 ──────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases \
            -f tag_name="${{ github.ref_name }}" \
            -f name="DailyLogger ${{ github.ref_name }}" \
            -f body="See the assets to download this version." \
            -F draft=true \
            --jq .id)
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - run: npm ci

      - name: Build macOS app
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$DMG" "DailyLogger-${{ github.ref_name }}-macos-arm64.dmg"
          gh release upload "${{ github.ref_name }}" "DailyLogger-${{ github.ref_name }}-macos-arm64.dmg"

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Build Windows app (no installer)
        env:
          RUST_BACKTRACE: "full"
        shell: pwsh
        run: |
          '{"bundle":{"active":false}}' | Out-File -FilePath nobundle.json -Encoding utf8 -NoNewline
          npm run tauri build -- --config nobundle.json

      - name: Upload exe to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "src-tauri/target/release/daily-logger.exe" "DailyLogger-${{ github.ref_name }}-windows-x64.exe"
          gh release upload "${{ github.ref_name }}" "DailyLogger-${{ github.ref_name }}-windows-x64.exe"

  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev libpipewire-0.3-dev

      - run: npm ci

      - name: Build Linux app
        run: npm run tauri build

      - name: Upload tar.gz to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp src-tauri/target/release/daily-logger DailyLogger
          tar czf "DailyLogger-${{ github.ref_name }}-linux-x64.tar.gz" DailyLogger
          gh release upload "${{ github.ref_name }}" "DailyLogger-${{ github.ref_name }}-linux-x64.tar.gz"

  publish-release:
    name: Publish Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
