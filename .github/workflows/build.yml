name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  # ── PR 构建：验证三平台均可编译 ──────────────────────────────────────────────
  build-pr:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
          - platform: 'windows-latest'
          - platform: 'ubuntu-24.04'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev libpipewire-0.3-dev libgbm-dev libegl-dev libgbm-dev libegl-dev

      - run: npm ci

      - name: Build (macOS)
        if: matrix.platform == 'macos-latest'
        run: npm run tauri build

      - name: Build Windows app
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          '{"bundle":{"targets":["nsis"]}}' | Out-File -FilePath nsis-only.json -Encoding utf8 -NoNewline
          npm run tauri build -- --config nsis-only.json

      - name: Build (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: npm run tauri build

      - name: Upload macOS artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: app-macos
          path: src-tauri/target/release/bundle/**/*

      - name: Upload Windows artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: app-windows
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/daily-logger.exe

      - name: Upload Linux artifact
        if: matrix.platform == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: app-linux
          path: src-tauri/target/release/daily-logger

  # ── Tag 推送：先建 Release，再并行构建三平台，最后发布 ──────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}

    steps:
      - uses: actions/checkout@v6

      - name: Create draft release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_BODY=$(cat <<'BODY'
          ## Installation

          ### Windows
          **Installer** (recommended): Download `*-setup.exe` and run it. The installer will automatically set up WebView2 if needed.
          > Windows SmartScreen may show a warning for unsigned apps. Click **"More info"** → **"Run anyway"** to proceed.

          **Portable** (no install): Download `*-portable.exe` and run directly. Requires Windows 10/11 with WebView2 runtime pre-installed.

          ### macOS
          Download the `.dmg`, open it, and drag DailyLogger to Applications.
          > macOS Gatekeeper may block unsigned apps. Right-click the app → **"Open"** → **"Open"** to bypass. Alternatively, run in Terminal:
          > ```
          > xattr -cr /Applications/DailyLogger.app
          > ```

          ### Linux
          Download the `.tar.gz`, extract it, and run the binary:
          ```bash
          tar xzf DailyLogger-*.tar.gz
          chmod +x DailyLogger
          ./DailyLogger
          ```
          BODY
          )
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases \
            -f tag_name="${{ github.ref_name }}" \
            -f name="DailyLogger ${{ github.ref_name }}" \
            -f body="$RELEASE_BODY" \
            -F draft=true \
            --jq .id)
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build macOS app
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$DMG" "DailyLogger-${{ github.ref_name }}-macos-arm64.dmg"
          gh release upload "${{ github.ref_name }}" "DailyLogger-${{ github.ref_name }}-macos-arm64.dmg"

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Windows app
        shell: pwsh
        run: |
          '{"bundle":{"targets":["nsis"]}}' | Out-File -FilePath nsis-only.json -Encoding utf8 -NoNewline
          npm run tauri build -- --config nsis-only.json

      - name: Upload installer and portable to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NSIS_EXE=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" | head -1)
          cp "$NSIS_EXE" "DailyLogger-${{ github.ref_name }}-windows-x64-setup.exe"
          gh release upload "${{ github.ref_name }}" "DailyLogger-${{ github.ref_name }}-windows-x64-setup.exe"
          cp src-tauri/target/release/daily-logger.exe "DailyLogger-${{ github.ref_name }}-windows-x64-portable.exe"
          gh release upload "${{ github.ref_name }}" "DailyLogger-${{ github.ref_name }}-windows-x64-portable.exe"

  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev libpipewire-0.3-dev libgbm-dev libegl-dev

      - run: npm ci

      - name: Build Linux app
        run: npm run tauri build

      - name: Upload tar.gz to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp src-tauri/target/release/daily-logger DailyLogger
          tar czf "DailyLogger-${{ github.ref_name }}-linux-x64.tar.gz" DailyLogger
          gh release upload "${{ github.ref_name }}" "DailyLogger-${{ github.ref_name }}-linux-x64.tar.gz"

  publish-release:
    name: Publish Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
